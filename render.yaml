services:
  - type: web
    name: clips
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: APP_BOOTSTRAP_SECRET
        sync: false
      - key: APP_ENCRYPTION_KEY
        sync: false
      - key: APP_DATA_DIR
        value: /var/data/app
      - key: CODEX_SESSIONS_DIR
        value: /var/data/codex-sessions
      - key: CODEX_BIN
        value: /usr/local/bin/codex
      - key: YTDLP_COOKIES
        sync: false
      - key: YTDLP_COOKIES_PATH
        sync: false
      - key: YOUTUBE_DATA_API_KEY
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      - key: GOOGLE_OAUTH_CLIENT_SECRET
        sync: false
      - key: VISOLIX_API_KEY
        sync: false
      - key: VISOLIX_BASE_URL
        value: https://developers.visolix.com
      - key: VISOLIX_YOUTUBE_FORMAT
        value: "720"
      - key: CODEX_STAGE2_MODEL
        value: gpt-5.2
      - key: CODEX_STAGE2_REASONING_EFFORT
        value: high
      - key: CODEX_STAGE2_TIMEOUT_MS
        value: "120000"
      - key: CODEX_STAGE2_DESCRIPTION_MODEL
        value: gpt-5.2
      - key: CODEX_STAGE2_DESCRIPTION_REASONING_EFFORT
        value: medium
      - key: CODEX_STAGE2_DESCRIPTION_TIMEOUT_MS
        value: "90000"
      - key: STAGE2_MAX_CONCURRENT_RUNS
        value: "4"
      - key: SOURCE_MAX_CONCURRENT_JOBS
        value: "4"
      - key: CHANNEL_STYLE_DISCOVERY_MAX_CONCURRENT_RUNS
        value: "4"
      - key: HOSTED_SUBPROCESS_MAX_CONCURRENT
        value: "4"
      - key: CODEX_STAGE3_MODEL
        value: gpt-5.2
      - key: CODEX_STAGE3_REASONING_EFFORT
        value: extra-high
      - key: CODEX_STAGE3_TIMEOUT_MS
        value: "120000"
      - key: STAGE3_DEFAULT_EXECUTION_TARGET
        value: local
      - key: STAGE3_ALLOW_HOST_EXECUTION
        value: "0"
      - key: STAGE3_HOST_MAX_CONCURRENT_JOBS
        value: "4"
      - key: STAGE3_HOSTED_HEAVY_JOB_MAX_CONCURRENT
        value: "4"
      - key: STAGE3_WORKER_PAIRING_TTL_SEC
        value: "3600"
      - key: STAGE3_WORKER_SESSION_TTL_SEC
        value: "2592000"
      - key: REMOTION_RENDER_TIMEOUT_MS
        value: "180000"
    disk:
      name: clips-data
      mountPath: /var/data
      sizeGB: 10
